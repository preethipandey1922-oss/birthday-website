<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romantic Birthday Wishes</title>
  <style>
    body {
      background: linear-gradient(to right, #ff99cc, #ffcccc);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background: #ff3366;
      color: white;
      padding: 20px;
      font-size: 2em;
      letter-spacing: 2px;
    }
    .card {
      background: white;
      margin: 40px auto;
      padding: 30px;
      width: 60%;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
    }
    h2 {
      color: #ff3366;
    }
    .heart {
      font-size: 50px;
      color: #ff3366;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    textarea {
      width: 80%;
      height: 100px;
      border: 2px solid #ff3366;
      border-radius: 10px;
      padding: 10px;
      font-size: 1em;
    }
    button {
      margin-top: 15px;
      background: #ff3366;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover {
      background: #e62e5c;
    }
    footer {
      margin-top: 40px;
      padding: 15px;
      background: #ff3366;
      color: white;
    }
  </style>
</head>
<body>
  <header>💖 Happy Birthday My Love 💖</header>

  <div class="card">
    <h2>To the one who makes my heart smile</h2>
    <p class="heart">❤️</p>
    <p>Write your romantic wish below:</p>
    <textarea placeholder="Type your heartfelt message here..."></textarea><br>
    <button>Generate Romantic Wish Card</button>
  </div>

  <footer>
    Made with love 💕 | Forever Yours
  </footer>
</body>
</html>
